---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  IMAGE_DESC: "Ublue KDE DX Development Environment - Custom bootc image with KDE unstable builds"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue,kde,development"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: dx
            base_image: ghcr.io/ublue-os/base-main:latest
            suffix: ""
          - name: nvidia
            base_image: ghcr.io/ublue-os/base-nvidia:latest
            suffix: "-nvidia"

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: mathio/gha-cleanup@v1
        with:
         remove-browsers: true
         verbose: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
            tool-cache: true
            android: true
            dotnet: true
            haskell: true
            large-packages: true
            docker-images: true
            swap-storage: true

      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "BASE_IMAGE=${{ matrix.variant.base_image }}" >> ${GITHUB_ENV}
          echo "VARIANT_NAME=${{ matrix.variant.name }}" >> ${GITHUB_ENV}
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "IMAGE_NAME=${IMAGE_NAME,,}${{ matrix.variant.suffix }}-dev" >> ${GITHUB_ENV}
            echo "DEFAULT_TAG=dev" >> ${GITHUB_ENV}
          else
            echo "IMAGE_NAME=${IMAGE_NAME,,}${{ matrix.variant.suffix }}" >> ${GITHUB_ENV}
            echo "DEFAULT_TAG=latest" >> ${GITHUB_ENV}
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Mount BTRFS for podman storage
        id: container-storage-action
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2
          loopback-free: '1'

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/refs/heads/main/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/refs/heads/main/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/main/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=${{ github.ref == 'refs/heads/dev' }}
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        continue-on-error: true
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          oci: false

      - name: Extract build logs and clean image
        if: always()
        run: |
          mkdir -p /tmp/kde-build-logs

          buildah unshare bash -c "
            CONTAINER=\$(buildah from localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }})
            MOUNT=\$(buildah mount \$CONTAINER)
            cp -r \$MOUNT/usr/lib/kde-build-logs/. /tmp/kde-build-logs/ || echo 'No logs found'
            rm -rf \$MOUNT/usr/lib/kde-build-logs
            buildah umount \$CONTAINER
            buildah commit \$CONTAINER localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
            buildah rm \$CONTAINER
          "

          EXIT_CODE_FILE=/tmp/kde-build-logs/exit-code
          if [ -f "$EXIT_CODE_FILE" ]; then
            BUILD_EXIT=$(cat "$EXIT_CODE_FILE")
            if [ "$BUILD_EXIT" -ne 0 ]; then
              echo "Build failed with exit code $BUILD_EXIT (from build.sh). See logs."
              exit "$BUILD_EXIT"
            fi
          else
            if [ "${{ steps.build_image.outcome }}" = "failure" ]; then
              echo "Build image step failed and no exit-code file was written."
              exit 1
            fi
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        id: push
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')

      - name: Sign container image
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          for tag in ${{ steps.metadata.outputs.tags }}; do
            cosign sign -y --key env://COSIGN_PRIVATE_KEY $IMAGE_FULL:$tag
          done
        env:
          TAGS: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
