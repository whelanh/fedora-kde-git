---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check_kde_tar:
    name: Check KDE nightly tar exists
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check for kde-nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view kde-nightly --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "::error::kde-nightly release not found. Please run the 'Build KDE Master' workflow first to generate the tar."
            exit 1
          fi
          if ! gh release view kde-nightly --repo ${{ github.repository }} --json assets --jq '.assets[].name' | grep -q 'kde-master.tar.zst'; then
            echo "::error::kde-master.tar.zst not found in kde-nightly release. Please run the 'Build KDE Master' workflow first."
            exit 1
          fi
          echo "kde-nightly release and tar found, proceeding with image build."

  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04
    needs: check_kde_tar
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: dx
            base_image: ghcr.io/ublue-os/base-main:latest
            suffix: ""
          - name: nvidia
            base_image: ghcr.io/ublue-os/base-nvidia:latest
            suffix: "-nvidia"

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: mathio/gha-cleanup@v1
        with:
         remove-browsers: true
         verbose: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
            tool-cache: true
            android: true
            dotnet: true
            haskell: true
            large-packages: true
            docker-images: true
            swap-storage: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Mount BTRFS for podman storage
        id: container-storage-action
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2
          loopback-free: '1'

      - name: Download KDE tar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download kde-nightly \
            --repo ${{ github.repository }} \
            --pattern 'kde-master.tar.zst' \
            --output build_files/kde-master.tar.zst

          # Try to download the pinned base image digest
          if gh release download kde-nightly \
            --repo ${{ github.repository }} \
            --pattern 'base-image-digest.txt' \
            --output /tmp/base-image-digest.txt 2>/dev/null; then
            DIGEST_MAIN=$(grep '^main=' /tmp/base-image-digest.txt | cut -d= -f2)
            DIGEST_NVIDIA=$(grep '^nvidia=' /tmp/base-image-digest.txt | cut -d= -f2)
            echo "Using pinned base-main digest: ${DIGEST_MAIN}"
            echo "Using pinned base-nvidia digest: ${DIGEST_NVIDIA}"
            echo "PINNED_BASE_IMAGE=ghcr.io/ublue-os/base-main@${DIGEST_MAIN}" >> ${GITHUB_ENV}
            echo "PINNED_NVIDIA_BASE_IMAGE=ghcr.io/ublue-os/base-nvidia@${DIGEST_NVIDIA}" >> ${GITHUB_ENV}
          else
            echo "::warning::base-image-digest.txt not found in kde-nightly release. Falling back to :latest — ABI compatibility not guaranteed."
            echo "PINNED_BASE_IMAGE=ghcr.io/ublue-os/base-main:latest" >> ${GITHUB_ENV}
            echo "PINNED_NVIDIA_BASE_IMAGE=ghcr.io/ublue-os/base-nvidia:latest" >> ${GITHUB_ENV}
          fi

      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          if [ "${{ matrix.variant.name }}" = "nvidia" ]; then
            echo "BASE_IMAGE=${PINNED_NVIDIA_BASE_IMAGE}" >> ${GITHUB_ENV}
          else
            echo "BASE_IMAGE=${PINNED_BASE_IMAGE}" >> ${GITHUB_ENV}
          fi
          echo "VARIANT_NAME=${{ matrix.variant.name }}" >> ${GITHUB_ENV}
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "IMAGE_NAME=${{ github.event.repository.name }}${{ matrix.variant.suffix }}-dev" >> ${GITHUB_ENV}
            echo "DEFAULT_TAG=dev" >> ${GITHUB_ENV}
          else
            echo "IMAGE_NAME=${{ github.event.repository.name }}${{ matrix.variant.suffix }}" >> ${GITHUB_ENV}
            echo "DEFAULT_TAG=latest" >> ${GITHUB_ENV}
          fi

      - name: Build Image
        id: build-image
        run: |
          sudo -E $(command -v just) build \
            ${IMAGE_NAME} \
            ${DEFAULT_TAG}

      - name: Extract build logs and clean image
        if: always()
        run: |
          mkdir -p /tmp/kde-build-logs

          CONTAINER=$(sudo podman create localhost/${IMAGE_NAME}:${DEFAULT_TAG} bash)
          sudo podman cp ${CONTAINER}:/usr/lib/kde-build-logs/. /tmp/kde-build-logs/ || echo 'No logs found'
          MOUNT=$(sudo podman mount ${CONTAINER})
          sudo rm -rf ${MOUNT}/usr/lib/kde-build-logs
          sudo podman umount ${CONTAINER}
          sudo podman commit ${CONTAINER} localhost/${IMAGE_NAME}:${DEFAULT_TAG}
          sudo podman rm ${CONTAINER}

          EXIT_CODE_FILE=/tmp/kde-build-logs/exit-code
          if [ -f "$EXIT_CODE_FILE" ]; then
            BUILD_EXIT=$(cat "$EXIT_CODE_FILE")
            if [ "$BUILD_EXIT" -ne 0 ]; then
              echo "Build failed with exit code $BUILD_EXIT (from build.sh). See logs."
              exit "$BUILD_EXIT"
            fi
          else
            if [ "${{ steps.build-image.outcome }}" = "failure" ]; then
              echo "Build image step failed and no exit-code file was written."
              exit 1
            fi
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kde-build-logs-${{ matrix.variant.name }}
          path: /tmp/kde-build-logs/
          retention-days: 7

      - name: Rechunk with rpm-ostree
        id: rechunk
        run: |
          sudo -E $(command -v just) ostree-rechunk \
            ${IMAGE_NAME} \
            ${DEFAULT_TAG}

      - name: Generate Build Tags
        id: gen-build-tags
        run: |
          alias_tags="$(sudo -E $(command -v just) generate-build-tags \
                        ${IMAGE_NAME} \
                        ${DEFAULT_TAG})"
          echo "Tags for this Action..."
          echo "${alias_tags}"
          echo "alias_tags=${alias_tags}" >> $GITHUB_OUTPUT

      - name: Tag Image
        id: tag-images
        env:
          ALIAS_TAGS: ${{ steps.gen-build-tags.outputs.alias_tags }}
        run: |
          sudo -E $(command -v just) tag-images \
            "${IMAGE_NAME}" \
            "${DEFAULT_TAG}" \
            "${ALIAS_TAGS}"

      - name: Push To GHCR
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        id: push-image
        env:
          ALIAS_TAGS: ${{ steps.gen-build-tags.outputs.alias_tags }}
        run: |
          set -euox pipefail
          for tag in ${ALIAS_TAGS}; do
            sudo podman push ${IMAGE_NAME}:${tag} ${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}
          done

          digest=$(sudo skopeo inspect docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG} --format '{{.Digest}}')
          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        with:
          cosign-release: 'v2.6.1'

      - name: Sign container image
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          COSIGN_REGISTRY_USERNAME: ${{ github.actor }}
          COSIGN_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY ${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}
