---
name: Build KDE Master

on:
  #schedule:
  #  - cron: '00 02 * * *'
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

concurrency:
  group: kde-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build_kde:
    name: Build KDE from source
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: mathio/gha-cleanup@v1
        with:
          remove-browsers: true
          verbose: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5

      - name: Set up ccache
        uses: actions/cache@v6
        with:
          path: /home/runner/ccache
          key: ccache-kde-build-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-kde-build-${{ github.ref_name }}-
            ccache-kde-build-

      - name: Inject ccache into build
        run: |
          mkdir -p /home/runner/ccache
          chmod 777 /home/runner/ccache

      - name: Capture base image tag
        run: |
          mkdir -p /tmp/kde-work
          TAG="rawhide"

          echo "Using tag: ${TAG}"
          echo "BASE_IMAGE_TAG=${TAG}" >> ${GITHUB_ENV}
          printf "rawhide=quay.io/fedora-ostree-desktops/base-atomic:%s\n" "${TAG}" > /tmp/kde-work/base-image-digest.txt

      - name: Build KDE in container
        run: |
          mkdir -p /tmp/kde-work
          sudo podman run --rm \
            --privileged \
            --volume "$(pwd)/build_files:/ctx:ro" \
            --volume "/home/runner/ccache:/ccache" \
            --volume "/tmp/kde-work:/work" \
            quay.io/fedora-ostree-desktops/base-atomic:${BASE_IMAGE_TAG} \
            bash /ctx/kde-build-container.sh

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kde-build-logs-${{ github.ref_name }}
          path: /tmp/kde-work/logs/
          retention-days: 7

      - name: Upload KDE tar to kde-nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: kde-nightly-${{ github.ref_name }}
          name: KDE Master Nightly (${{ github.ref_name }})
          body: "KDE git master build for branch ${{ github.ref_name }} — updated daily. Do not use directly, consumed by the image build pipeline."
          prerelease: true
          make_latest: false
          files: |
            /tmp/kde-work/kde-master.tar.zst
            /tmp/kde-work/base-image-digest.txt
          token: ${{ secrets.GITHUB_TOKEN }}
