name: Build KDE Master

on:
  schedule:
    - cron: '00 02 * * *'
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: kde-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build_kde:
    name: Build KDE from source
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: mathio/gha-cleanup@v1
        with:
          remove-browsers: true
          verbose: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Set up ccache
        uses: actions/cache@v6
        with:
          path: /home/runner/ccache
          key: ccache-kde-build-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-kde-build-${{ github.ref_name }}-
            ccache-kde-build-

      - name: Set up kde-builder work dir cache (source + build objects)
        uses: actions/cache@v6
        with:
          path: /home/runner/kde-builder
          key: kde-builder-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            kde-builder-${{ github.ref_name }}-

      - name: Set up KDE install tree cache
        uses: actions/cache@v6
        with:
          path: /home/runner/kde-install
          key: kde-install-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            kde-install-${{ github.ref_name }}-

      - name: Inject ccache into build
        run: |
          mkdir -p /home/runner/ccache /home/runner/kde-builder /home/runner/kde-install
          chmod 777 /home/runner/ccache /home/runner/kde-builder /home/runner/kde-install

      - name: Capture base image tag
        run: |
          mkdir -p /tmp/kde-work

          DATE=$(date +%Y%m%d)
          TAG="rawhide.${DATE}.0"

          echo "Verifying tag exists: ${TAG}"
          skopeo inspect --no-creds docker://quay.io/fedora-ostree-desktops/kinoite:${TAG} > /dev/null

          echo "Using stable tag: ${TAG}"
          echo "BASE_IMAGE_TAG=${TAG}" >> ${GITHUB_ENV}
          printf "rawhide=quay.io/fedora-ostree-desktops/kinoite:%s\n" "${TAG}" > /tmp/kde-work/base-image-digest.txt

      - name: Pull base container image (with retries)
        run: |
          for attempt in 1 2 3; do
            echo "Pull attempt ${attempt}/3..."
            sudo podman pull quay.io/fedora-ostree-desktops/kinoite:${BASE_IMAGE_TAG} && break
            if [ "${attempt}" -eq 3 ]; then
              echo "All pull attempts failed."
              exit 1
            fi
            echo "Pull failed, retrying in 30s..."
            sleep 30
          done

      - name: Build KDE in container
        run: |
          mkdir -p /tmp/kde-work
          sudo podman run --rm \
            --privileged \
            --volume "$(pwd)/build_files:/ctx:ro" \
            --volume "/home/runner/ccache:/ccache" \
            --volume "/home/runner/kde-builder:/builder" \
            --volume "/home/runner/kde-install:/work/tree/install" \
            --volume "/tmp/kde-work:/work" \
            quay.io/fedora-ostree-desktops/kinoite:${BASE_IMAGE_TAG} \
            bash /ctx/kde-build-container.sh

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kde-build-logs-${{ github.ref_name }}
          path: /tmp/kde-work/logs/
          retention-days: 7

      - name: Stage build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kde-build-${{ github.ref_name }}
          path: |
            /tmp/kde-work/kde-master.tar.zst
            /tmp/kde-work/base-image-digest.txt
            /tmp/kde-work/kde-runtime-deps.txt
          retention-days: 1

  release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build_kde
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: kde-build-${{ github.ref_name }}
          path: /tmp/kde-work/

      - name: Upload KDE tar to kde-nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: kde-nightly-${{ github.ref_name }}
          name: KDE Master Nightly (${{ github.ref_name }})
          body: "KDE git master build for branch ${{ github.ref_name }} — updated daily. Do not use directly, consumed by the image build pipeline."
          prerelease: true
          make_latest: false
          files: |
            /tmp/kde-work/kde-master.tar.zst
            /tmp/kde-work/base-image-digest.txt
            /tmp/kde-work/kde-runtime-deps.txt
          token: ${{ secrets.GITHUB_TOKEN }}
