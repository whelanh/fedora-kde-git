---
name: Build KDE Master
on:
  schedule:
    - cron: '00 02 * * *'  # 2:00am UTC every day
  workflow_dispatch:

concurrency:
  group: kde-build
  cancel-in-progress: true

jobs:
  build_kde:
    name: Build KDE from source
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - uses: mathio/gha-cleanup@v1
        with:
          remove-browsers: true
          verbose: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
            tool-cache: true
            android: true
            dotnet: true
            haskell: true
            large-packages: true
            docker-images: true
            swap-storage: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Set up ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/ccache
          key: ccache-kde-build-${{ github.run_id }}
          restore-keys: |
            ccache-kde-build-
            ccache-main-
            ccache-dx-
            ccache-nvidia-
            ccache-dx-dev-

      - name: Inject ccache into build
        run: |
          mkdir -p /home/runner/ccache
          chmod 777 /home/runner/ccache

      - name: Capture base image digest
        run: |
          mkdir -p /tmp/kde-work
          digest_main=$(skopeo inspect docker://ghcr.io/ublue-os/base-main:latest --format '{{.Digest}}')
          digest_nvidia=$(skopeo inspect docker://ghcr.io/ublue-os/base-nvidia:latest --format '{{.Digest}}')
          echo "BASE_IMAGE_DIGEST_MAIN=${digest_main}" >> ${GITHUB_ENV}
          echo "BASE_IMAGE_DIGEST_NVIDIA=${digest_nvidia}" >> ${GITHUB_ENV}
          printf "main=%s\nnvidia=%s\n" "${digest_main}" "${digest_nvidia}" > /tmp/kde-work/base-image-digest.txt
          echo "base-main digest: ${digest_main}"
          echo "base-nvidia digest: ${digest_nvidia}"

      - name: Build KDE in container
        run: |
          mkdir -p /tmp/kde-work

          sudo podman run --rm \
            --privileged \
            --volume "$(pwd)/build_files:/ctx:ro" \
            --volume "/home/runner/ccache:/ccache" \
            --volume "/tmp/kde-work:/work" \
            ghcr.io/ublue-os/base-main@${BASE_IMAGE_DIGEST_MAIN} \
            bash /ctx/kde-build-container.sh

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kde-build-logs
          path: /tmp/kde-work/logs/
          retention-days: 7

      - name: Upload KDE tar to kde-nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kde-nightly
          name: KDE Master Nightly
          body: "KDE git master build — updated daily. Do not use directly, consumed by the image build pipeline."
          prerelease: true
          files: |
            /tmp/kde-work/kde-master.tar.zst
            /tmp/kde-work/base-image-digest.txt
          token: ${{ secrets.GITHUB_TOKEN }}
